on:
  push:
    branches:
      - "main"
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron:  '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: setup python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: install python packages
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create local changes
      run: |
        curl -X GET https://www.meldkamerspel.com/einsaetze.json > inzetten.json
        curl -X GET https://www.meldkamerspel.com/alliance_event_types.json > events.json
        python Update.py
      env:
        DISCORD: ${{ secrets.DISCORD  }}

    - name: Archive removed missions
      run: python Overige/Check_removed_missions.py
                
    - name: json-syntax-check
      uses: limitusus/json-syntax-check@v1
      with:
        pattern: "\\.json$"

    - name: Format JSON files
      run: npx prettier --write "**/*.json"

    - name: Commit and push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git diff --cached --quiet || git commit -m "Update files"
        git push
